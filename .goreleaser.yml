# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ocis-mcp-server

builds:
  - id: ocis-mcp-server
    main: ./cmd/ocis-mcp-server
    binary: ocis-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: owncloud
    name: ocis-mcp-server
  header: |
    ## What's Changed

    See the full [CHANGELOG](https://github.com/owncloud/ocis-mcp-server/blob/main/CHANGELOG.md) for details.
  extra_files:
    - glob: CHANGELOG.md
    - glob: LICENSE
