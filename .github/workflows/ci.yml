name: CI

on:
  push:
    branches:
      - main
      - "feat/*"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Build
        run: go build ./...

      - name: Test with race detector and coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=70
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...

  verify-commits:
    name: Verify Commit Signatures
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify all commits are signed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Checking commit signatures from $BASE_SHA to $HEAD_SHA"
          UNSIGNED=""
          for COMMIT in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            RESULT=$(git log --format='%G?' -1 "$COMMIT")
            SUBJECT=$(git log --format='%s' -1 "$COMMIT")
            case "$RESULT" in
              G|U|X|Y)
                echo "  [SIGNED]   $COMMIT $SUBJECT"
                ;;
              *)
                echo "  [UNSIGNED] $COMMIT $SUBJECT"
                UNSIGNED="$UNSIGNED $COMMIT"
                ;;
            esac
          done
          if [ -n "$UNSIGNED" ]; then
            echo ""
            echo "::warning::Unsigned commits detected. See https://docs.github.com/en/authentication/managing-commit-signature-verification/about-commit-signature-verification"
          fi
